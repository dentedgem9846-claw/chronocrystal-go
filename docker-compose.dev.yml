services:
  chronocrystal:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
      - ./skills:/app/skills
      - ./tools:/app/tools
    environment:
      - CHRONOCRYSTAL_CONFIG=/app/config.toml
    restart: unless-stopped