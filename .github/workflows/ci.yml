name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Install SQLite3 dev
      run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
    - name: Build
      env:
        CGO_ENABLED: 1
      run: go build ./...
    - name: Vet
      run: go vet ./...
    - name: Test
      env:
        CGO_ENABLED: 1
      run: go test -race -count=1 ./internal/...
    - name: Build tools
      run: |
        for dir in tools/*/; do
          (cd "$dir" && go build .)
        done

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Install SQLite3 dev
      run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
      env:
        CGO_ENABLED: 1